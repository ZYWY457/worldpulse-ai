gdelt:
  enabled: true
  source_weight: 0.55
  timespan: 24h
  max_records: 50
  sort: datedesc
  queries:
    - category: world
      query: '(war OR conflict OR missile OR drone OR attack OR military OR ceasefire OR election OR protest OR sanctions OR coup OR "state of emergency" OR diplomacy OR inflation OR recession OR "central bank" OR oil OR trade OR earthquake OR flood OR wildfire OR hurricane OR outbreak OR epidemic OR cybersecurity OR semiconductor OR "data breach")'
