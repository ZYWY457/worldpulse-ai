gdelt:
  enabled: true
  source_weight: 0.55
  timespan: 24h
  max_records: 20
  max_queries_per_run: 4
  per_query_delay_seconds: 8
  sort: datedesc
  queries:
    - category: sanctions_conflict
      query: '(sanctions OR "export control" OR "asset freeze" OR OFAC OR embargo OR "trade restriction")'
      max_records: 40
    - category: port_disruption
      query: '("port strike" OR "shipping delay" OR "shipping disruption" OR "red sea" OR suez OR "container backlog" OR "air cargo delay")'
      max_records: 40
    - category: tariff_policy
      query: '(tariff OR customs OR "anti-dumping" OR "import duty" OR "trade war" OR "de minimis")'
      max_records: 40
    - category: central_bank
      query: '("central bank" OR "interest rate" OR inflation OR CPI OR "rate cut" OR "rate hike" OR "monetary policy")'
      max_records: 40
    - category: currency_oil
      query: '("oil price" OR crude OR brent OR WTI OR "natural gas" OR currency OR exchange-rate OR dollar)'
      max_records: 35
    - category: chips
      query: '(semiconductor OR chipmaker OR "AI chip" OR GPU OR Nvidia OR TSMC OR "export controls")'
      max_records: 35
    - category: ai_model
      query: '("artificial intelligence" OR "AI model" OR "large language model" OR OpenAI OR DeepSeek OR Anthropic)'
      max_records: 35
    - category: cloud_datacenter
      query: '("data center" OR datacenter OR "cloud outage" OR "power demand" OR "AI infrastructure")'
      max_records: 30
    - category: cybersecurity
      query: '(cyberattack OR ransomware OR "data breach" OR malware OR "critical vulnerability" OR hack)'
      max_records: 40
    - category: military_conflict
      query: '(war OR missile OR drone OR attack OR military OR ceasefire OR "border clash" OR "armed conflict")'
      max_records: 40
    - category: protest_unrest
      query: '(protest OR strike OR riot OR unrest OR coup OR "state of emergency" OR election)'
      max_records: 35
    - category: disaster
      query: '(earthquake OR flood OR wildfire OR hurricane OR typhoon OR drought OR landslide)'
      max_records: 35
    - category: health
      query: '(outbreak OR epidemic OR pandemic OR "public health emergency" OR WHO OR avian OR mpox)'
      max_records: 30
    - category: raw_materials
      query: '(lithium OR copper OR nickel OR cobalt OR "rare earth" OR uranium OR "critical minerals")'
      max_records: 35
    - category: factory_disruption
      query: '("factory fire" OR "factory shutdown" OR "plant closure" OR "labor strike" OR "production halt")'
      max_records: 30

crawler_static:
  # --- Trade / Customs / Sanctions ---
  - name: USTR Press Releases
    type: crawler_static
    source_pack: trade
    industry_tags: [trade, geopolitics, supply_chain]
    category: tariff_policy
    source_weight: 0.93
    url: https://ustr.gov/about-us/policy-offices/press-office/press-releases
    item_selector: ".view-content .views-row, article, li"
    title_selector: "a, h2, h3"
    link_selector: "a[href]"
    date_selector: "time, .date-display-single, .field-content"
    summary_selector: "p"
    include_keywords: [tariff, trade, duty, import, customs, policy, enforcement]
    exclude_keywords: [cookie, privacy, newsletter, navigation]
    max_items: 20
    enabled: true
    crawl_interval_minutes: 360
    robots_note: "Public press release index; low-frequency fetch."

  - name: CBP Newsroom
    type: crawler_static
    source_pack: trade
    industry_tags: [trade, supply_chain, geopolitics]
    category: customs_clearance
    source_weight: 0.92
    url: https://www.cbp.gov/newsroom
    item_selector: "article, .views-row, li"
    title_selector: "a, h2, h3"
    link_selector: "a[href]"
    date_selector: "time, .date-display-single, .datetime"
    summary_selector: "p"
    include_keywords: [customs, border, import, enforcement, seizure, trade, cargo]
    exclude_keywords: [cookie, privacy, newsletter, navigation]
    max_items: 20
    enabled: true
    crawl_interval_minutes: 360
    robots_note: "Public newsroom index; low-frequency fetch."

  - name: OFAC Recent Actions
    type: crawler_static
    source_pack: trade
    industry_tags: [trade, finance, geopolitics, supply_chain]
    category: sanctions_conflict
    source_weight: 0.95
    url: https://ofac.treasury.gov/recent-actions
    item_selector: ".view-content .views-row, article, li"
    title_selector: "a, h2, h3"
    link_selector: "a[href]"
    date_selector: "time, .date, .field-content"
    summary_selector: "p"
    include_keywords: [sanctions, designation, blocked, treasury, enforcement, russia, iran]
    exclude_keywords: [cookie, privacy, newsletter, navigation]
    max_items: 20
    enabled: true
    crawl_interval_minutes: 360
    robots_note: "Public recent actions page; low-frequency fetch."

  # --- Logistics / Service Alerts ---
  - name: DHL Service Alerts
    type: crawler_static
    source_pack: trade
    industry_tags: [trade, supply_chain]
    category: logistics_delay
    source_weight: 0.88
    url: https://www.dhl.com/global-en/home/important-information.html
    item_selector: "article, .cmp-container, li"
    title_selector: "a, h2, h3, h4"
    link_selector: "a[href]"
    date_selector: "time, .date"
    summary_selector: "p"
    include_keywords: [service, alert, delay, disruption, shipment, delivery, transit]
    exclude_keywords: [cookie, privacy, newsletter, navigation]
    max_items: 15
    enabled: true
    crawl_interval_minutes: 180
    robots_note: "Public service information page; low-frequency fetch."

  - name: FedEx Service Alerts
    type: crawler_static
    source_pack: trade
    industry_tags: [trade, supply_chain]
    category: logistics_delay
    source_weight: 0.88
    url: https://www.fedex.com/en-us/service-alerts.html
    item_selector: "article, .fxg-alert, .card, li"
    title_selector: "a, h2, h3, h4"
    link_selector: "a[href]"
    date_selector: "time, .date"
    summary_selector: "p"
    include_keywords: [service, alert, delay, disruption, shipment, delivery, transit]
    exclude_keywords: [cookie, privacy, newsletter, navigation]
    max_items: 15
    enabled: true
    crawl_interval_minutes: 180
    robots_note: "Public service alert page; low-frequency fetch."
